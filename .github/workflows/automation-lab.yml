name: Live Automation Lab Tests

on:
  workflow_dispatch:
    # Allows external APIs to trigger this workflow

jobs:
  run-showcase-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Interactive Showcase Test
      run: npx playwright test app/tests/moodys-com/e2e/interactive-showcase.spec.ts

    - name: Upload Test Results Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: test-results/
        retention-days: 7
